    <style>
        :root {
            --primary-color: #e74c3c;
            --wa-color: #25d366;
            --fb-color: #1877f2;
            --yt-color: #ff0000;
            --dark-bg: #222;
        }

        body {
            font-family: 'Hind', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Breaking News Ticker --- */
        .ticker-wrapper {
            width: 100%;
            background: var(--dark-bg);
            color: #fff;
            padding: 8px 0;
            overflow: hidden;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            border-bottom: 2px solid var(--primary-color);
        }
        .ticker-title {
            background: var(--primary-color);
            padding: 0 15px;
            font-weight: bold;
            white-space: nowrap;
            z-index: 2;
            font-size: 14px;
        }
        .ticker-text {
            white-space: nowrap;
            display: inline-block;
            animation: marquee 25s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* --- Digital Clock Section --- */
        .clock-section {
            background: #fff;
            width: 100%;
            text-align: center;
            padding: 10px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-bottom: 1px solid #ddd;
        }
        #digital-clock {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            letter-spacing: 1px;
        }
        #current-date {
            font-size: 13px;
            color: #666;
            margin-top: 2px;
        }

        header {
            text-align: center;
            padding: 20px;
            background: white;
            width: 100%;
        }

        .container {
            width: 95%;
            max-width: 600px;
            margin-top: 15px;
        }

        /*     */
        .weather-box {
            background: linear-gradient(135deg, #00b4db, #0083b0);
            color: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            text-align: center;
        }
        .google-search-container {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .search-form { display: flex; gap: 5px; }
        .search-input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        .search-btn { background: #4285f4; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; }

        /*   */
        .admin-section {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #eee;
        }
        .admin-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .btn { padding: 10px 20px; border-radius: 25px; text-decoration: none; color: white; font-weight: bold; font-size: 14px; }
        .fb { background: var(--fb-color); }
        .yt { background: var(--yt-color); }

        .category-title { background: #34495e; color: white; padding: 10px; border-radius: 8px; font-weight: bold; margin-top: 20px; }
        .link-card { background: white; padding: 15px; border-radius: 10px; margin-top: 10px; display: flex; justify-content: space-between; border-left: 5px solid var(--wa-color); text-decoration: none; color: #333; font-weight: bold; }

        footer { margin: 40px 0; text-align: center; color: #888; font-size: 12px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;600&display=swap" rel="stylesheet">
</head>
